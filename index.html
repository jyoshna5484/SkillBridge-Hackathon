<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SkillBridge - Career Search</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* Tech themed background */
background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
url("https://images.unsplash.com/photo-1518770660439-4636190af475");

background-size:cover;
background-position:center;
}

.container{
background: rgba(255,255,255,0.95);
padding:40px;
border-radius:12px;
width:420px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
color:#1a237e;
margin-bottom:5px;
}

p{
color:#444;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px 25px;
background:#1a237e;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0d144f;
}

</style>

</head>

<body>

<div class="container">

<h1>SkillBridge</h1>
<p>Search Your Tech Career</p>

<form action="/select_career" method="POST">

<input list="careers" name="career" placeholder="Search career (e.g., Data Scientist)" required>

<datalist id="careers">

<option value="Software Developer">
<option value="Software Engineer">
<option value="Frontend Developer">
<option value="Backend Developer">
<option value="Full Stack Developer">
<option value="Web Developer">
<option value="Mobile App Developer">

<option value="Data Scientist">
<option value="Data Analyst">
<option value="Machine Learning Engineer">
<option value="AI Engineer">

<option value="Cyber Security Analyst">
<option value="Ethical Hacker">

<option value="Cloud Engineer">
<option value="DevOps Engineer">

<option value="Network Engineer">
<option value="System Administrator">

<option value="Blockchain Developer">
<option value="IoT Engineer">

<option value="UI Designer">
<option value="UX Designer">

<option value="Software Tester">
<option value="QA Engineer">

</datalist>

<button type="submit">Continue</button>

</form>

</div>

</body>
</html>
